<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ABHINAV TOOLS AND BOTS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Animated Solo Leveling Background -->
    <div class="background-container">
        <canvas id="canvas"></canvas>
        <div class="glow-effect"></div>
    </div>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-content">
                <h1>⚔️ ABHINAV TOOLS AND BOTS</h1>
                <p>Public Dashboard</p>
            </div>
            <button class="btn btn-back" onclick="goHome()">← Back Home</button>
        </header>

        <main class="dashboard-main">
            <div class="search-section">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-box" 
                    placeholder="🔍 Search tools by name or keywords..."
                    onkeyup="filterTools()"
                >
                <div class="filter-options">
                    <button class="filter-btn active" onclick="sortTools('name')">📝 Name</button>
                    <button class="filter-btn" onclick="sortTools('date')">📅 Newest</button>
                </div>
            </div>

            <div id="toolsGrid" class="tools-grid">
                <!-- Tools will be loaded here -->
            </div>

            <div id="emptyState" class="empty-state">
                <p>📦 No files uploaded yet</p>
                <small>Check back soon for amazing tools!</small>
            </div>
        </main>
    </div>

    <!-- Modal for viewing README -->
    <div id="readmeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">README</h2>
                <button class="close-btn" onclick="closeReadmeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeReadmeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
